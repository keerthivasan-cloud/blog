<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO METADATA -->
    <title>{{TITLE}} | NewsForge Terminal</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <meta name="keywords" content="{{KEYWORDS}}">
    
    <!-- OPEN GRAPH -->
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:image" content="{{OG_IMAGE}}">
    <meta property="og:type" content="article">
    <meta name="twitter:card" content="summary_large_image">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #05070F;
            --bg-soft: #0A0D1A;
            --accent: #EA580C;
            --accent-soft: rgba(234, 88, 12, 0.1);
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            margin-bottom: 5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2rem;
        }

        .brand {
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
        }

        .meta {
            font-weight: 800;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.04em;
            margin: 0 0 2rem 0;
            text-transform: uppercase;
        }

        .hero-image {
            width: 100%;
            height: 450px;
            object-fit: cover;
            border-radius: 2rem;
            margin-bottom: 4rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* PROSE SYSTEM */
        .content {
            font-size: 1.15rem;
            color: var(--text-secondary);
        }

        .content h2 {
            color: var(--text-primary);
            font-weight: 800;
            text-transform: uppercase;
            margin-top: 3.5rem;
            border-left: 4px solid var(--accent);
            padding-left: 1.5rem;
        }

        .content p {
            margin-bottom: 2rem;
        }

        .content blockquote {
            margin: 3rem 0;
            padding: 2rem;
            background: var(--bg-soft);
            border-radius: 1.5rem;
            font-style: italic;
            border-left: 4px solid var(--accent);
        }

        footer {
            margin-top: 8rem;
            padding-top: 4rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--text-secondary);
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.25rem; }
            .hero-image { height: 250px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="brand">
                <div class="brand-icon"></div>
                NewsForge Terminal
            </a>
        </header>

        <main>
            <div class="meta">
                <span>{{CATEGORY}} PROTOCOL</span>
                <span>•</span>
                <span>{{DATE}}</span>
            </div>
            
            <h1>{{TITLE}}</h1>
            
            <img src="{{IMAGE}}" class="hero-image" alt="{{TITLE}}">

            <article class="content">
                {{CONTENT}}
            </article>
        </main>

        <footer>
            © 2026 NEWSFORGE GLOBAL INTELLIGENCE BINARY.
        </footer>
    </div>
</body>
</html>
